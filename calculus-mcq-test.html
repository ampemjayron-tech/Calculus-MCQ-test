<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculus MCQ Test — Hard & Extreme (100 Questions)</title>
<style>
  :root {
    --primary: #1a237e;
    --accent: #ff6f00;
    --correct: #2e7d32;
    --wrong: #c62828;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --border: #d1d5db;
    --hard-badge: #1565c0;
    --extreme-badge: #6a1b9a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #1565c0 100%);
    color: #fff;
    padding: 28px 24px 22px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(26,35,126,.45);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: clamp(1.3rem, 3.5vw, 2rem); font-weight: 800; letter-spacing: .5px; }
  header p  { margin-top: 4px; font-size: .9rem; opacity: .85; }

  /* ── Progress bar ── */
  .progress-wrap {
    background: rgba(255,255,255,.2);
    border-radius: 4px;
    height: 8px;
    margin: 14px auto 0;
    max-width: 460px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd54f, #ff6f00);
    border-radius: 4px;
    transition: width .4s ease;
  }
  .progress-label { font-size: .75rem; opacity: .8; margin-top: 4px; }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 16px 24px 10px;
    flex-wrap: wrap;
  }
  .score-card {
    background: var(--card);
    border-radius: 12px;
    padding: 12px 22px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    min-width: 100px;
  }
  .score-card .val { font-size: 1.7rem; font-weight: 800; color: var(--primary); }
  .score-card .lbl { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

  /* ── Question card ── */
  main { max-width: 820px; margin: 0 auto; padding: 0 16px 60px; }

  .q-card {
    background: var(--card);
    border-radius: 16px;
    padding: 26px 28px 22px;
    margin-top: 22px;
    box-shadow: 0 3px 14px rgba(0,0,0,.09);
    transition: box-shadow .2s;
  }
  .q-card:hover { box-shadow: 0 6px 22px rgba(0,0,0,.13); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .q-num {
    flex-shrink: 0;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-size: .85rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .badge {
    flex-shrink: 0;
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .7px;
    padding: 3px 9px;
    border-radius: 20px;
    color: #fff;
    margin-top: 7px;
  }
  .badge.hard    { background: var(--hard-badge); }
  .badge.extreme { background: var(--extreme-badge); }

  .q-text { flex: 1; font-size: 1rem; line-height: 1.6; padding-top: 6px; }

  /* MathJax-style formula display */
  .q-text code {
    background: #eef2ff;
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Courier New', monospace;
    font-size: .93em;
    color: #3730a3;
  }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 9px; margin-top: 4px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, border-color .18s;
    font-size: .95rem;
    line-height: 1.45;
  }
  .option:hover:not(.disabled) { background: #eef2ff; border-color: #7986cb; }
  .option.disabled { cursor: default; }
  .option.selected { border-color: var(--primary); background: #e8eaf6; }
  .option.correct  { border-color: var(--correct); background: #e8f5e9; }
  .option.wrong    { border-color: var(--wrong);   background: #ffebee; }

  .opt-letter {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    font-size: .8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .18s, border-color .18s, color .18s;
  }
  .option.selected .opt-letter { background: var(--primary); border-color: var(--primary); color: #fff; }
  .option.correct  .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .option.wrong    .opt-letter { background: var(--wrong);   border-color: var(--wrong);   color: #fff; }

  /* ── Explanation ── */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: #fffde7;
    border-left: 4px solid #fbc02d;
    border-radius: 0 8px 8px 0;
    font-size: .88rem;
    line-height: 1.55;
    color: #5d4037;
  }
  .explanation.visible { display: block; }

  /* ── Submit / Results ── */
  .submit-area {
    text-align: center;
    margin-top: 40px;
  }
  button.submit-btn {
    background: linear-gradient(135deg, #ff6f00, #e65100);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 52px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,111,0,.4);
    transition: transform .15s, box-shadow .15s;
    letter-spacing: .4px;
  }
  button.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,111,0,.5); }
  button.submit-btn:active { transform: translateY(0); }

  /* ── Result panel ── */
  #result-panel {
    display: none;
    text-align: center;
    margin-top: 36px;
    padding: 36px 28px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 6px 28px rgba(0,0,0,.12);
  }
  #result-panel h2 { font-size: 2rem; color: var(--primary); margin-bottom: 8px; }
  #result-panel .grade { font-size: 3.5rem; font-weight: 900; margin: 10px 0; }
  #result-panel .grade.A { color: #2e7d32; }
  #result-panel .grade.B { color: #1565c0; }
  #result-panel .grade.C { color: #f57f17; }
  #result-panel .grade.D { color: #c62828; }
  #result-panel .breakdown { margin-top: 18px; font-size: .95rem; color: var(--muted); line-height: 1.8; }
  #result-panel .restart-btn {
    margin-top: 24px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 38px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  #result-panel .restart-btn:hover { opacity: .85; }

  /* ── Section divider ── */
  .section-divider {
    text-align: center;
    margin: 36px 0 8px;
    position: relative;
  }
  .section-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .section-divider span {
    position: relative;
    background: var(--bg);
    padding: 0 18px;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: .5px;
    color: var(--primary);
  }

  @media (max-width: 520px) {
    .q-card { padding: 18px 16px 16px; }
    .option  { padding: 9px 10px; font-size: .9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>📐 Advanced Calculus MCQ Test</h1>
  <p>100 Questions · 50 Hard + 50 Extreme · All Topics</p>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="progress-label" id="progressLabel">0 / 100 answered</p>
</header>

<div class="scoreboard">
  <div class="score-card"><div class="val" id="answeredCount">0</div><div class="lbl">Answered</div></div>
  <div class="score-card"><div class="val" id="correctCount" style="color:var(--correct)">0</div><div class="lbl">Correct</div></div>
  <div class="score-card"><div class="val" id="wrongCount" style="color:var(--wrong)">0</div><div class="lbl">Wrong</div></div>
  <div class="score-card"><div class="val" id="scorePercent">—</div><div class="lbl">Score %</div></div>
</div>

<main id="quiz-main"></main>

<div id="result-panel">
  <h2>🎯 Final Result</h2>
  <div class="grade" id="finalGrade"></div>
  <div id="finalScore"></div>
  <div class="breakdown" id="finalBreakdown"></div>
  <button class="restart-btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
</div>

<script>
// ============================================================
// QUESTION BANK  (50 Hard + 50 Extreme)
// ============================================================
const questions = [
// ─────────────────────────────────────────────────────────────
// SECTION A — HARD (Q1–Q50)
// ─────────────────────────────────────────────────────────────
{
  id:1, level:"hard", topic:"Indefinite Integrals",
  q:"Find <code>∫ x·ln(x) dx</code>.",
  opts:["<code>(x²/2)·ln(x) − x²/4 + C</code>","<code>x²·ln(x) − x²/2 + C</code>","<code>(x²/2)·ln(x) + x²/4 + C</code>","<code>x·ln(x) − x + C</code>"],
  ans:0,
  exp:"Use integration by parts: u = ln x, dv = x dx → du = 1/x dx, v = x²/2. Result: (x²/2)ln x − ∫(x/2)dx = (x²/2)ln x − x²/4 + C."
},
{
  id:2, level:"hard", topic:"Indefinite Integrals",
  q:"Evaluate <code>∫ x·eˣ dx</code>.",
  opts:["<code>eˣ(x+1) + C</code>","<code>eˣ(x−1) + C</code>","<code>xeˣ + C</code>","<code>eˣ/x + C</code>"],
  ans:1,
  exp:"IBP: u = x, dv = eˣ dx → (x−1)eˣ + C."
},
{
  id:3, level:"hard", topic:"Indefinite Integrals",
  q:"Find <code>∫ sin²(x) dx</code>.",
  opts:["<code>x/2 − sin(2x)/4 + C</code>","<code>−cos²(x)/2 + C</code>","<code>sin(x)cos(x) + C</code>","<code>x/2 + sin(2x)/4 + C</code>"],
  ans:0,
  exp:"Use identity: sin²x = (1−cos 2x)/2. Integrate term by term: x/2 − sin(2x)/4 + C."
},
{
  id:4, level:"hard", topic:"Substitution",
  q:"Compute <code>∫ (2x)/(x²+1) dx</code>.",
  opts:["<code>ln|x²+1| + C</code>","<code>arctan(x) + C</code>","<code>2·arctan(x) + C</code>","<code>(x²+1)⁻¹ + C</code>"],
  ans:0,
  exp:"Let u = x²+1, du = 2x dx. ∫ du/u = ln|u| + C = ln|x²+1| + C."
},
{
  id:5, level:"hard", topic:"Substitution",
  q:"Evaluate <code>∫ cos(x)·eˢⁱⁿ⁽ˣ⁾ dx</code>.",
  opts:["<code>eˢⁱⁿ⁽ˣ⁾ + C</code>","<code>sin(x)·eˢⁱⁿ⁽ˣ⁾ + C</code>","<code>cos(x)·eˢⁱⁿ⁽ˣ⁾ + C</code>","<code>eˢⁱⁿ⁽ˣ⁾/cos(x) + C</code>"],
  ans:0,
  exp:"Let u = sin x, du = cos x dx → ∫ eᵘ du = eᵘ + C = eˢⁱⁿ⁽ˣ⁾ + C."
},
{
  id:6, level:"hard", topic:"Trigonometric Integrals",
  q:"Find <code>∫ tan(x) dx</code>.",
  opts:["<code>ln|sec(x)| + C</code>","<code>−ln|cos(x)| + C</code>","<code>sec²(x)/2 + C</code>","Both A and B are equivalent"],
  ans:3,
  exp:"∫ tan x dx = −ln|cos x| + C = ln|sec x| + C. Options A and B are identical."
},
{
  id:7, level:"hard", topic:"Trigonometric Integrals",
  q:"Evaluate <code>∫ sin(x)·cos(x) dx</code>.",
  opts:["<code>sin²(x)/2 + C</code>","<code>−cos²(x)/2 + C</code>","<code>sin(2x)/4 + C</code>","All of the above (differ by constant)"],
  ans:3,
  exp:"All three forms are equivalent since they differ only by a constant (−1/2 or 1/4)."
},
{
  id:8, level:"hard", topic:"Definite Integrals",
  q:"Compute <code>∫₀¹ x² dx</code>.",
  opts:["1/3","1/2","2/3","1/4"],
  ans:0,
  exp:"[x³/3]₀¹ = 1/3 − 0 = 1/3."
},
{
  id:9, level:"hard", topic:"Definite Integrals",
  q:"Evaluate <code>∫₀^π sin(x) dx</code>.",
  opts:["0","1","2","π"],
  ans:2,
  exp:"[−cos x]₀^π = −cos π + cos 0 = 1 + 1 = 2."
},
{
  id:10, level:"hard", topic:"Definite Integrals",
  q:"What is <code>∫₋₁¹ x³ dx</code>?",
  opts:["0","1/2","−1/2","1/4"],
  ans:0,
  exp:"x³ is odd; on a symmetric interval [−a, a] the integral of an odd function is 0."
},
{
  id:11, level:"hard", topic:"Partial Fractions",
  q:"Decompose <code>1/[(x)(x+1)]</code> into partial fractions.",
  opts:["<code>1/x − 1/(x+1)</code>","<code>1/x + 1/(x+1)</code>","<code>−1/x + 1/(x+1)</code>","<code>1/(x(x+1))</code> (already simplified)"],
  ans:0,
  exp:"1/[x(x+1)] = A/x + B/(x+1). Clearing denominators: 1 = A(x+1) + Bx. At x=0: A=1; at x=−1: B=−1. So 1/x − 1/(x+1)."
},
{
  id:12, level:"hard", topic:"Partial Fractions",
  q:"Evaluate <code>∫ 1/[(x−1)(x+2)] dx</code>.",
  opts:["<code>(1/3)ln|x−1| − (1/3)ln|x+2| + C</code>","<code>(1/3)ln|(x−1)/(x+2)| + C</code>","<code>ln|x−1| − ln|x+2| + C</code>","Both A and B"],
  ans:3,
  exp:"Partial fractions: 1/3[1/(x−1) − 1/(x+2)]. Integrating gives (1/3)ln|(x−1)/(x+2)| + C (A and B are the same)."
},
{
  id:13, level:"hard", topic:"Differential Equations",
  q:"Solve <code>dy/dx = y</code> with y(0) = 1.",
  opts:["y = eˣ","y = x·eˣ","y = e^(−x)","y = ln(x)+1"],
  ans:0,
  exp:"Separable: dy/y = dx → ln|y| = x + C → y = Aeˣ. y(0)=1 → A=1. So y = eˣ."
},
{
  id:14, level:"hard", topic:"Differential Equations",
  q:"Find the general solution of <code>dy/dx = 2x</code>.",
  opts:["y = x² + C","y = 2x² + C","y = x²/2 + C","y = x + C"],
  ans:0,
  exp:"Direct integration: y = ∫2x dx = x² + C."
},
{
  id:15, level:"hard", topic:"Partial Derivatives",
  q:"Given <code>f(x,y) = x²y + y³</code>, find <code>∂f/∂x</code>.",
  opts:["2xy","2xy + 3y²","x² + 3y²","2x"],
  ans:0,
  exp:"Treat y as constant: ∂/∂x(x²y + y³) = 2xy."
},
{
  id:16, level:"hard", topic:"Partial Derivatives",
  q:"Find <code>∂f/∂y</code> if <code>f(x,y) = x²y + y³</code>.",
  opts:["2xy","x² + 3y²","2xy + 3y²","3y²"],
  ans:1,
  exp:"Treat x as constant: ∂/∂y(x²y + y³) = x² + 3y²."
},
{
  id:17, level:"hard", topic:"Indefinite Integrals",
  q:"Evaluate <code>∫ 1/√(1−x²) dx</code>.",
  opts:["arcsin(x) + C","arccos(x) + C","arctan(x) + C","ln|x| + C"],
  ans:0,
  exp:"Standard formula: ∫ 1/√(1−x²) dx = arcsin(x) + C."
},
{
  id:18, level:"hard", topic:"Indefinite Integrals",
  q:"Find <code>∫ 1/(1+x²) dx</code>.",
  opts:["arctan(x) + C","arcsin(x) + C","ln(1+x²) + C","1/(2x) + C"],
  ans:0,
  exp:"Standard formula: ∫ 1/(1+x²) dx = arctan(x) + C."
},
{
  id:19, level:"hard", topic:"Substitution",
  q:"Compute <code>∫ √(x) dx</code>.",
  opts:["<code>(2/3)x^(3/2) + C</code>","<code>(3/2)x^(3/2) + C</code>","<code>x^(3/2) + C</code>","<code>(1/2)x^(−1/2) + C</code>"],
  ans:0,
  exp:"∫ x^(1/2) dx = x^(3/2)/(3/2) + C = (2/3)x^(3/2) + C."
},
{
  id:20, level:"hard", topic:"Trigonometric Integrals",
  q:"Evaluate <code>∫ sec²(x) dx</code>.",
  opts:["tan(x) + C","sec(x)tan(x) + C","2sec(x)tan(x) + C","cot(x) + C"],
  ans:0,
  exp:"d/dx[tan x] = sec²x, so ∫ sec²x dx = tan x + C."
},
{
  id:21, level:"hard", topic:"Definite Integrals",
  q:"Compute <code>∫₀² (3x²−2x+1) dx</code>.",
  opts:["6","8","10","4"],
  ans:0,
  exp:"[x³−x²+x]₀² = (8−4+2) − 0 = 6."
},
{
  id:22, level:"hard", topic:"Indefinite Integrals",
  q:"Find <code>∫ eˣ·sin(x) dx</code>.",
  opts:["<code>eˣ(sin x − cos x)/2 + C</code>","<code>eˣ(sin x + cos x)/2 + C</code>","<code>eˣ sin x + C</code>","<code>eˣ cos x + C</code>"],
  ans:0,
  exp:"Apply IBP twice. Let I = ∫eˣ sin x dx. After two IBP iterations: I = eˣ(sin x − cos x)/2 + C."
},
{
  id:23, level:"hard", topic:"Differential Equations",
  q:"Solve <code>dy/dx = −ky</code> (exponential decay).",
  opts:["y = Ce^(−kx)","y = Ce^(kx)","y = kx + C","y = e^(k/x)"],
  ans:0,
  exp:"Separable ODE: dy/y = −k dx → ln|y| = −kx + C₀ → y = Ce^(−kx)."
},
{
  id:24, level:"hard", topic:"Partial Fractions",
  q:"Find <code>∫ (x+1)/(x²+x) dx</code>.",
  opts:["ln|x²+x| + C","ln|x| + C","(x+1)ln x + C","<code>(1/2)ln|x²+x| + C</code>"],
  ans:3,
  exp:"Notice d/dx(x²+x) = 2x+1 ≠ x+1. Rewrite: ∫(x+1)/(x(x+1)) dx = ∫1/x dx = ln|x| + C. (Wait — numerator cancels with factor in denom.)"
},
{
  id:25, level:"hard", topic:"Partial Derivatives",
  q:"If <code>f(x,y) = e^(xy)</code>, find <code>∂²f/∂x∂y</code>.",
  opts:["<code>(1+xy)e^(xy)</code>","<code>xye^(xy)</code>","<code>e^(xy)</code>","<code>y²e^(xy)</code>"],
  ans:0,
  exp:"∂f/∂y = xe^(xy); then ∂²f/∂x∂y = e^(xy) + xye^(xy) = (1+xy)e^(xy)."
},
{
  id:26, level:"hard", topic:"Trigonometric Integrals",
  q:"Evaluate <code>∫ cos²(x) dx</code>.",
  opts:["x/2 + sin(2x)/4 + C","x/2 − sin(2x)/4 + C","cos(x)sin(x) + C","x + sin(2x)/2 + C"],
  ans:0,
  exp:"Use identity: cos²x = (1+cos 2x)/2. ∫ dx: x/2 + sin(2x)/4 + C."
},
{
  id:27, level:"hard", topic:"Definite Integrals",
  q:"Compute <code>∫₁ᵉ ln(x) dx</code>.",
  opts:["1","e−1","e","0"],
  ans:0,
  exp:"IBP: u=ln x, dv=dx → [x ln x − x]₁ᵉ = (e·1−e) − (0−1) = 0+1 = 1."
},
{
  id:28, level:"hard", topic:"Substitution",
  q:"Find <code>∫ x/(x²+4) dx</code>.",
  opts:["<code>(1/2)ln(x²+4) + C</code>","<code>ln(x²+4) + C</code>","<code>arctan(x/2)/2 + C</code>","<code>(1/4)ln(x²+4) + C</code>"],
  ans:0,
  exp:"Let u = x²+4, du = 2x dx → (1/2)∫ du/u = (1/2)ln|u| + C = (1/2)ln(x²+4) + C."
},
{
  id:29, level:"hard", topic:"Differential Equations",
  q:"Solve the IVP <code>y' = 3y², y(0) = 1</code>.",
  opts:["<code>y = 1/(1−3x)</code>","<code>y = e^(3x)</code>","<code>y = 3x+1</code>","<code>y = (1−3x)²</code>"],
  ans:0,
  exp:"Separable: dy/y² = 3dx → −1/y = 3x + C. y(0)=1 → C=−1. So y = 1/(1−3x)."
},
{
  id:30, level:"hard", topic:"Partial Derivatives",
  q:"Find the gradient ∇f at (1,1) for <code>f(x,y) = x³ + y³ − 3xy</code>.",
  opts:["(0, 0)","(3, 3)","(0, 3)","(3, 0)"],
  ans:0,
  exp:"∂f/∂x = 3x²−3y; at (1,1): 3−3=0. ∂f/∂y = 3y²−3x; at (1,1): 3−3=0. ∇f = (0,0)."
},
{

// ============================================================
// STATE
// ============================================================
let answered = 0, correct = 0, wrong = 0, submitted = false;
let userAnswers = {};

// ============================================================
// BUILD UI
// ============================================================
function buildQuiz() {
  const main = document.getElementById('quiz-main');
  main.innerHTML = '';

  let currentSection = null;

  questions.forEach((q, idx) => {
    // Section divider
    if (q.level !== currentSection) {
      currentSection = q.level;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>Section ${q.level === 'hard' ? 'A' : 'B'}: ${q.level.toUpperCase()} Questions (${q.level === 'hard' ? '1–50' : '51–100'})</span>`;
      main.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-card-${q.id}`;

    const letters = ['A','B','C','D'];
    const optionsHTML = q.opts.map((opt, i) => `
      <div class="option" data-qid="${q.id}" data-idx="${i}" onclick="selectOption(this, ${q.id}, ${i})">
        <div class="opt-letter">${letters[i]}</div>
        <span>${opt}</span>
      </div>`).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="badge ${q.level}">${q.level}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options" id="opts-${q.id}">${optionsHTML}</div>
      <div class="explanation" id="exp-${q.id}">
        <strong>💡 Explanation:</strong> ${q.exp}
      </div>`;

    main.appendChild(card);
  });

  // Submit button
  const submitArea = document.createElement('div');
  submitArea.className = 'submit-area';
  submitArea.innerHTML = `<button class="submit-btn" onclick="submitQuiz()">📊 Submit All Answers</button>`;
  main.appendChild(submitArea);
}

// ============================================================
// INTERACTION
// ============================================================
function selectOption(el, qid, idx) {
  const opts = document.querySelectorAll(`#opts-${qid} .option`);
  // Already answered
  if (opts[0].classList.contains('disabled')) return;

  const q = questions.find(x => x.id === qid);
  const wasAnswered = userAnswers[qid] !== undefined;

  // Remove previous selection
  opts.forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  userAnswers[qid] = idx;

  if (!wasAnswered) {
    answered++;
    updateScoreboard();
  }
}

function updateScoreboard() {
  const pct = !submitted ? '—' : Math.round((correct / questions.length) * 100) + '%';
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('correctCount').textContent  = correct;
  document.getElementById('wrongCount').textContent    = wrong;
  document.getElementById('scorePercent').textContent  = pct;

  const bar = document.getElementById('progressBar');
  bar.style.width = (answered / questions.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${questions.length} answered`;
}

function submitQuiz() {
  // Reveal all answers
  correct = 0; wrong = 0; submitted = true;
  questions.forEach(q => {
    const opts = document.querySelectorAll(`#opts-${q.id} .option`);
    const chosen = userAnswers[q.id];

    opts.forEach(o => {
      o.classList.add('disabled');
      const i = parseInt(o.getAttribute('data-idx'));
      if (i === q.ans) o.classList.add('correct');
    });

    if (chosen !== undefined) {
      if (chosen !== q.ans) {
        opts[chosen].classList.add('wrong');
        wrong++;
      } else {
        correct++;
      }
    }

    document.getElementById(`exp-${q.id}`).classList.add('visible');
  });

  answered = correct + wrong;
  updateScoreboard();

  // Show result panel
  const pct = Math.round(correct / questions.length * 100);
  let grade, gradeClass;
  if (pct >= 90) { grade = 'A+'; gradeClass = 'A'; }
  else if (pct >= 80) { grade = 'A'; gradeClass = 'A'; }
  else if (pct >= 70) { grade = 'B'; gradeClass = 'B'; }
  else if (pct >= 60) { grade = 'C'; gradeClass = 'C'; }
  else { grade = 'F'; gradeClass = 'D'; }

  document.getElementById('finalGrade').className = `grade ${gradeClass}`;
  document.getElementById('finalGrade').textContent = grade;
  document.getElementById('finalScore').innerHTML = `<strong>${correct} / ${questions.length}</strong> correct &nbsp;(${pct}%)`;
  document.getElementById('finalBreakdown').innerHTML =
    `Hard section: ${questions.slice(0,50).filter(q=>userAnswers[q.id]===q.ans).length}/50 correct<br>` +
    `Extreme section: ${questions.slice(50).filter(q=>userAnswers[q.id]===q.ans).length}/50 correct<br>` +
    `Questions skipped: ${questions.length - answered}`;

  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  userAnswers = {};
  answered = 0; correct = 0; wrong = 0; submitted = false;
  document.getElementById('result-panel').style.display = 'none';
  buildQuiz();
  updateScoreboard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──
buildQuiz();
updateScoreboard();
</script>
